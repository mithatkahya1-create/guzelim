    #bg.clear{
      filter:blur(3px) brightness(.92) saturate(1.12);
      transform:scale(1.02);
    }

    #overlay{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.18), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(255,210,230,.16), transparent 20%),
        radial-gradient(circle at 50% 85%, rgba(255,170,210,.16), transparent 22%),
        linear-gradient(rgba(255,120,170,.08), rgba(255,90,150,.12));
      z-index:-2;
      pointer-events:none;
    }

    #start{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:rgba(255,160,190,.22);
      backdrop-filter:blur(8px);
      cursor:pointer;
      z-index:20;
      transition:opacity .8s ease;
      text-align:center;
      padding:24px;
    }

    #start h2{
      margin-top:22px;
      font-size:30px;
      font-weight:normal;
      text-shadow:
        0 0 10px rgba(255,255,255,.9),
        0 0 20px rgba(255,105,180,.8);
    }

    #start p{
      margin-top:8px;
      font-size:16px;
      opacity:.88;
      animation:blink 1.8s infinite;
    }

    @keyframes blink{
      0%,100%{opacity:.9}
      50%{opacity:.35}
    }

    #intro{
      position:fixed;
      top:42%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:clamp(34px,6vw,58px);
      color:#fff4f8;
      text-shadow:
        0 0 12px rgba(255,255,255,.95),
        0 0 26px rgba(255,105,180,.85),
        0 0 46px rgba(255,0,120,.45);
      opacity:0;
      z-index:25;
      pointer-events:none;
      white-space:nowrap;
    }

    #intro.show{
      animation:introAnim 3.2s ease forwards;
    }

    @keyframes introAnim{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.92);
      }
      25%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
      }
      75%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
      }
      100%{
        opacity:0;
        transform:translate(-50%,-58%) scale(1.04);
      }
    }

    .envelope{
      position:relative;
      width:220px;
      height:145px;
      filter:drop-shadow(0 16px 28px rgba(255,60,130,.18));
    }

    .env-body{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,#ffe6ef,#ffd2e2);
      border-radius:10px;
      overflow:hidden;
    }

    .env-flap{
      position:absolute;
      inset:0;
      clip-path:polygon(0 0,100% 0,50% 58%);
      background:linear-gradient(180deg,#fff0f5,#ffcadd);
      transform-origin:top center;
      transition:transform 1s ease;
      z-index:3;
    }

    .env-letter{
      position:absolute;
      left:50%;
      top:16px;
      transform:translateX(-50%);
      width:84%;
      height:108px;
      background:rgba(255,255,255,.82);
      border-radius:8px;
      z-index:1;
      transition:transform 1.2s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .env-letter::before{
      content:"";
      position:absolute;
      top:16px;
      left:18px;
      right:18px;
      height:2px;
      background:rgba(200,100,130,.16);
      box-shadow:0 14px 0 rgba(200,100,130,.16), 0 28px 0 rgba(200,100,130,.16);
    }

    #start.open .env-flap{
      transform:rotateX(180deg);
    }

    #start.open .env-letter{
      transform:translateX(-50%) translateY(-26px);
    }

    #main{
      display:none;
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:5;
    }

    #textWrap{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:26px;
      z-index:10;
      pointer-events:none;
    }

    #text{
      width:min(92vw, 760px);
      max-height:72vh;
      overflow-y:auto;
      text-align:center;
      white-space:pre-wrap;
      font-size:clamp(21px, 3vw, 29px);
      line-height:1.95;
      color:#fff7fa;
      text-shadow:
        0 0 10px rgba(255,255,255,.95),
        0 0 20px rgba(255,130,190,.55),
        0 0 34px rgba(255,80,150,.22);
      padding:18px 12px;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }

    #text::-webkit-scrollbar{ display:none; }

    .cursor{
      display:inline-block;
      animation:cursorBlink .8s infinite;
    }

    @keyframes cursorBlink{
      0%,49%{opacity:1}
      50%,100%{opacity:0}
    }

    .heart{
      position:absolute;
      bottom:-30px;
      pointer-events:none;
      user-select:none;
      animation:floatUp linear forwards;
      filter:drop-shadow(0 0 10px rgba(255,70,150,.7));
      z-index:2;
    }

    @keyframes floatUp{
      0%{
        transform:translateY(0) scale(.85) rotate(0deg);
        opacity:0;
      }
      15%{ opacity:.95; }
      100%{
        transform:translateY(-120vh) scale(1.45) rotate(18deg);
        opacity:0;
      }
    }

    .burst{
      position:absolute;
      pointer-events:none;
      user-select:none;
      z-index:3;
      animation:burstAnim 1.15s ease-out forwards;
    }

    @keyframes burstAnim{
      0%{
        transform:translate(-50%,-50%) scale(.6);
        opacity:0;
      }
      20%{ opacity:1; }
      100%{
        transform:translate(-50%,-50%) scale(3.4);
        opacity:0;
      }
    }

    .tap-heart{
      position:absolute;
      transform:translate(-50%,-50%);
      font-size:24px;
      pointer-events:none;
      z-index:30;
      animation:tapPop 1s ease-out forwards;
    }

    .tap-text{
      position:absolute;
      transform:translate(-50%,-50%);
      font-size:16px;
      white-space:nowrap;
      color:#fff4f8;
      text-shadow:0 0 10px rgba(255,255,255,.8);
      pointer-events:none;
      z-index:30;
      animation:tapRise 1.15s ease-out forwards;
    }

    @keyframes tapPop{
      0%{opacity:1; transform:translate(-50%,-50%) scale(.8)}
      100%{opacity:0; transform:translate(-50%,-50%) scale(3)}
    }

    @keyframes tapRise{
      0%{opacity:0; transform:translate(-50%,0)}
      20%{opacity:1}
      100%{opacity:0; transform:translate(-50%,-34px)}
    }

    #final{
      position:fixed;
      inset:0;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      background:rgba(255,150,190,.16);
      backdrop-filter:blur(4px);
      z-index:40;
      padding:24px;
    }

    #final h2{
      font-size:clamp(38px,6vw,74px);
      font-weight:normal;
      color:#fff6fa;
      text-shadow:
        0 0 12px rgba(255,255,255,.95),
        0 0 28px rgba(255,100,170,.8),
        0 0 48px rgba(255,0,120,.42);
      margin-bottom:12px;
    }

    #final p{
      font-size:clamp(18px,3vw,24px);
      color:#fff8fb;
      text-shadow:0 0 10px rgba(255,255,255,.4);
    }

    @media(max-width:600px){
      .envelope{
        width:190px;
        height:126px;
      }

      #start h2{
        font-size:26px;
      }

      #text{
        max-height:68vh;
      }
    }
  

    #ytplayer{
      position:fixed;
      width:1px;
      height:1px;
      left:-9999px;
      top:-9999px;
      opacity:0;
      pointer-events:none;
    }

    #musicBtn{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:60;
      border:none;
      border-radius:999px;
      padding:12px 16px;
      font-family:Georgia, serif;
      font-size:14px;
      color:#fff;
      background:rgba(255,105,180,.35);
      backdrop-filter:blur(10px);
      box-shadow:0 8px 24px rgba(0,0,0,.18);
      cursor:pointer;
      display:none;
    }

    #musicBtn.show{
      display:block;
    }

  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="overlay"></div>

  <div id="start">
    <div class="envelope">
      <div class="env-body"></div>
      <div class="env-letter"></div>
      <div class="env-flap"></div>
    </div>
    <h2>Bir mektubun var güzelim</h2>
    <p>dokun ve aç... ❤️</p>
  </div>

  <div id="intro">Güzelim... ❤️</div>

  <div id="main">
    <div id="textWrap">
      <div id="text"></div>
    </div>

    <div id="ytplayer" aria-hidden="true"></div>
  </div>

  <button id="musicBtn" type="button">🎵 Müziği aç</button>

  <div id="final">
    <h2>İyi ki doğdun güzelim ❤️</h2>
    <p>Sonsuza kadar sen... ❤️</p>
  </div>

  <script>
    const message = `İyi ki doğdun güzelim ❤️

Hayatıma girdiğin günden beri
her şey daha güzel oldu...

Seninle geçen her an
benim için ayrı bir mutluluk,
ayrı bir huzur oldu.

Gülüşün kalbimi ısıtıyor,
varlığın dünyamı güzelleştiriyor.

Bugün sadece doğum günün değil,
benim için iyi ki dediğim
en güzel günlerden biri.

İyi ki varsın güzelim ❤️`;

    const start = document.getElementById("start");
    const intro = document.getElementById("intro");
    const main = document.getElementById("main");
    const textEl = document.getElementById("text");
    const bg = document.getElementById("bg");
    const finalEl = document.getElementById("final");
    const musicBtn = document.getElementById("musicBtn");

    let player;
    let playerReady = false;
    let pendingPlay = false;


    function loadYouTubeAPI(){
      if(window.YT && window.YT.Player) return;
      if(document.getElementById("yt-api-script")) return;
      const tag = document.createElement("script");
      tag.id = "yt-api-script";
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    }

    window.onYouTubeIframeAPIReady = function(){
      player = new YT.Player("ytplayer", {
        width: "1",
        height: "1",
        videoId: "9TSf2k03HPA",
        playerVars: {
          autoplay: 0,
          controls: 0,
          disablekb: 1,
          fs: 0,
          loop: 1,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          playlist: "9TSf2k03HPA"
        },
        events: {
          onReady: function(){
            playerReady = true;
            if(pendingPlay) {
              tryPlayMusic();
            }
          }
        }
      });
    };

    function tryPlayMusic(){
      pendingPlay = true;
      if(!playerReady || !player) return;
      try {
        player.unMute();
        player.setVolume(100);
        player.playVideo();
        musicBtn.classList.remove("show");
      } catch (e) {
        musicBtn.classList.add("show");
      }
    }

    let i = 0;
    let started = false;
    let finished = false;

    function addCursor(){
      if(!document.querySelector(".cursor")){
        const c = document.createElement("span");
        c.className = "cursor";
        c.textContent = "|";
        textEl.appendChild(c);
      }
    }

    function removeCursor(){
      const c = document.querySelector(".cursor");
      if(c) c.remove();
    }

    function typeWriter(){
      addCursor();

      if(i < message.length){
        removeCursor();
        textEl.innerHTML += message.charAt(i);
        i++;
        addCursor();
        textEl.scrollTop = textEl.scrollHeight;

        const speed = message.charAt(i - 1) === "\n" ? 150 : 40;
        setTimeout(typeWriter, speed);
      } else {
        removeCursor();
        setTimeout(showFinal, 2200);
      }
    }

    function createHeart(){
      if(main.style.display !== "block") return;
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (14 + Math.random() * 24) + "px";
      heart.style.animationDuration = (4 + Math.random() * 3.5) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 8500);
    }

    function createBurst(){
      if(main.style.display !== "block") return;
      const symbols = ["💖","💕","💞","❤️","✨"];
      const b = document.createElement("div");
      b.className = "burst";
      b.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
      b.style.left = Math.random() * 100 + "vw";
      b.style.top = Math.random() * 100 + "vh";
      b.style.fontSize = (16 + Math.random() * 18) + "px";
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 1200);
    }

    function megaBurst(count = 50){
      for(let j = 0; j < count; j++){
        setTimeout(() => {
          const symbols = ["💖","💕","💞","❤️","✨"];
          const b = document.createElement("div");
          b.className = "burst";
          b.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
          b.style.left = (42 + Math.random() * 16) + "vw";
          b.style.top = (42 + Math.random() * 16) + "vh";
          b.style.fontSize = (18 + Math.random() * 26) + "px";
          document.body.appendChild(b);
          setTimeout(() => b.remove(), 1400);
        }, j * 45);
      }
    }

    function showFinal(){
      if(finished) return;
      finished = true;
      finalEl.style.display = "flex";
      megaBurst(65);
    }

    function startExperience(){
      if(started) return;
      started = true;

      loadYouTubeAPI();
      bg.classList.add("clear");
      intro.classList.add("show");

      setTimeout(() => {
        start.classList.add("open");
      }, 600);

      setTimeout(() => {
        start.style.opacity = "0";
      }, 1500);

      setTimeout(() => {
        start.style.display = "none";
        main.style.display = "block";
        musicBtn.classList.add("show");
        tryPlayMusic();

        setTimeout(() => {
          typeWriter();
        }, 500);
      }, 2200);
    }

    setInterval(createHeart, 230);
    setInterval(createBurst, 380);

    start.addEventListener("click", startExperience);
    start.addEventListener("touchstart", startExperience, { passive:true });

    musicBtn.addEventListener("click", () => {
      loadYouTubeAPI();
      tryPlayMusic();
    });

    document.body.addEventListener("click", (e) => {
      if(main.style.display === "block"){
        const heart = document.createElement("div");
        heart.className = "tap-heart";
        heart.innerHTML = "❤️";
        heart.style.left = e.clientX + "px";
        heart.style.top = e.clientY + "px";

        const text = document.createElement("div");
        text.className = "tap-text";
        text.innerHTML = "Seni çok seviyorum güzelim ❤️";
        text.style.left = e.clientX + "px";
        text.style.top = (e.clientY - 10) + "px";

        document.body.appendChild(heart);
        document.body.appendChild(text);

        setTimeout(() => {
          heart.remove();
          text.remove();
        }, 1200);
      }
    });
  </script>
</body>
</html>
